<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .blades {
      animation: spin 4s linear infinite;
      transform-origin: 50px 35px;
    }
    .tower {
      fill: #0056c6;
    }
    .blade {
      fill: #60a5fa;
    }
    .hub {
      fill: #0056c6;
    }
    .center-pin {
      fill: #ffffff;
    }
  </style>
  
  <!-- Torre (Estática) -->
  <path class="tower" d="M48 35 L44 85 L56 85 L52 35 Z" />
  <line x1="35" y1="85" x2="65" y2="85" stroke="#0056c6" stroke-width="3" stroke-linecap="round" />
  
  <!-- Cabeça da turbina (Nacelle) -->
  <circle class="hub" cx="50" cy="35" r="4.5" />
  
  <!-- Pás / Hélices (Animadas) -->
  <g class="blades">
    <!-- Pá 1 (Para cima) -->
    <path class="blade" d="M50 35 L48.5 8 Q48.5 6 50 6 Q51.5 6 51.5 8 L50 35 Z" />
    
    <!-- Pá 2 (Rotacionada 120 deg) -->
    <g transform="rotate(120, 50, 35)">
      <path class="blade" d="M50 35 L48.5 8 Q48.5 6 50 6 Q51.5 6 51.5 8 L50 35 Z" />
    </g>
    
    <!-- Pá 3 (Rotacionada 240 deg) -->
    <g transform="rotate(240, 50, 35)">
      <path class="blade" d="M50 35 L48.5 8 Q48.5 6 50 6 Q51.5 6 51.5 8 L50 35 Z" />
    </g>
    
    <!-- Pino Central -->
    <circle class="center-pin" cx="50" cy="35" r="1.5" />
  </g>
</svg>
